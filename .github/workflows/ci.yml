name: CI
on:
  - pull_request
  - push

jobs:
  Lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - name: Install NPM dependencies
        run: npm ci
      - name: Type Check
        run: npm run compile
      - name: Lint
        run: npm run lint

  VSCode-Test:
    name: ${{ matrix.os }} - VS Code Tests
    needs: Lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - name: Install NPM dependencies
        run: npm ci
      - name: Run VS Code Tests on Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:vscode
      - name: Run VS Code Tests
        if: runner.os != 'Linux'
        run: npm run test:vscode

  Coverage:
    name: Ubuntu - Coverage
    needs: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - name: Install NPM dependencies
        run: npm ci
      - name: Run Coverage
        run: xvfb-run -a npm run test:coverage

  Package:
    runs-on: ubuntu-latest
    needs: [Lint, VSCode-Test, Coverage]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - name: Install NPM dependencies
        run: npm ci
      - name: Build VSIX
        run: npx vsce package
      - name: Archive VSIX
        uses: actions/upload-artifact@v4
        with:
          path: titanium-sdk-*.vsix
